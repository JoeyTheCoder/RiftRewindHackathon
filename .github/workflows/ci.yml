name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate backend boot configuration
        env:
          NODE_ENV: test
          RIOT_API_KEY: RGAPI-test-key
          DATA_DIR: data
        run: pnpm --filter ./packages/backend test:boot

      - name: Build frontend
        run: pnpm --filter ./packages/frontend build